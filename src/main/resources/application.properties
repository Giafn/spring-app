spring.application.name=spring-app

# --- Datasource (Postgres) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:spring_app_db}
spring.datasource.username=${DB_USERNAME:gia}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.create-schemas=true
spring.flyway.default-schema=public

# --- Redis ---
spring.redis.host=localhost
spring.redis.port=6379

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=app:

# JWT
jwt.secret=${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# SpringDoc / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Jackson
spring.jackson.deserialization.fail-on-null-for-primitives=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Server
server.port=8080

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads

# App
app.base-url=http://localhost:${server.port}

